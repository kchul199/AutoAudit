services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: autoaudit-backend-dev
    env_file:
      - ${AUTOAUDIT_ENV_FILE:-.env}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: autoaudit-frontend-dev
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
